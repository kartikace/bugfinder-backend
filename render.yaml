databases:
  - name: bugfinder-db
    databaseName: bugfinder
    user: bugfinder_user
    plan: free

services:
  - type: web
    name: bugfinder-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bugfinder-db
          property: connectionString
      - key: DEFAULT_ADMIN_PASSWORD
        generateValue: true
      - key: DEFAULT_ADMIN_USERNAME
        value: admin
      - key: PYTHON_VERSION
        value: 3.11.0
